name: 🐞 Bug Report
description: Create a bug report to help us improve the firmware
title: "fix: "
labels: ["🐞❔ unconfirmed bug"]
body:
  - type: textarea
    attributes:
      label: Provide environment information
      description: |
        Run this command in your project root and paste the results in a code block:
        ```bash
        alr version && gnatprove --version
        ```
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of the bug (e.g. infinite loop, Storage_Error, SPARK proof failure), as well as what you expected to happen.
    validations:
      required: true
  - type: input
    attributes:
      label: Link to reproduction
      description: Please provide a link or snippet to a reproduction of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: To reproduce
      description: Describe how to reproduce your bug. Steps, code snippets, hardware connections, etc.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional information
      description: Add any other information related to the bug here, panic codes from matrix, screenshots, etc.
