version: '3.8'

services:
  builder:
    build: .
    volumes:
      - ..:/workspace
      # Cache Alire's downloaded compilers, tools, and indexes to speed up subsequent builds
      - alire_config:/root/.config/alire
      - alire_data:/root/.local/share/alire
    working_dir: /workspace/examples
    command: >
      sh -c "
      echo 'Updating Alire index...' && alr index --update-all &&
      echo 'Building blinky...' && cd /workspace/examples/blinky && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/blinky bin/blinky.hex &&
      echo 'Building console...' && cd /workspace/examples/console && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/console bin/console.hex &&
      echo 'Building display...' && cd /workspace/examples/display && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/display bin/display.hex &&
      echo 'Building sensors...' && cd /workspace/examples/sensors && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/sensors bin/sensors.hex &&
      echo 'Building compass...' && cd /workspace/examples/compass && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/compass bin/compass.hex &&
      echo 'Building audio...' && cd /workspace/examples/audio && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/audio bin/audio.hex &&
      echo 'Building wav_player...' && cd /workspace/examples/wav_player && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/wav_player bin/wav_player.hex &&
      echo 'Building parrot...' && cd /workspace/examples/parrot && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/parrot bin/parrot.hex &&
      echo 'Building sound_meter...' && cd /workspace/examples/sound_meter && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/sound_meter bin/sound_meter.hex &&
      echo 'Building logo_touch...' && cd /workspace/examples/logo_touch && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/logo_touch bin/logo_touch.hex &&
      echo 'Building temperature...' && cd /workspace/examples/temperature && alr --non-interactive build && arm-none-eabi-objcopy -O ihex bin/temperature bin/temperature.hex &&
      echo 'All examples built successfully!'
      "

volumes:
  alire_config:
  alire_data: