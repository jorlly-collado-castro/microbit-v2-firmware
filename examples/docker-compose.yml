version: '3.8'

services:
  builder:
    build: .
    volumes:
      - ..:/workspace
      # Cache Alire's downloaded compilers, tools, and indexes to speed up subsequent builds
      - alire_config:/root/.config/alire
      - alire_data:/root/.local/share/alire
    working_dir: /workspace/examples
    command: >
      bash -c "
      echo 'Building blinky example...' &&
      cd blinky &&
      alr --non-interactive build &&
      echo 'Converting blinky ELF to HEX...' &&
      arm-none-eabi-objcopy -O ihex bin/blinky bin/blinky.hex &&
      cd .. &&
      echo 'Building console example...' &&
      cd console &&
      alr --non-interactive build &&
      echo 'Converting console ELF to HEX...' &&
      arm-none-eabi-objcopy -O ihex bin/console bin/console.hex &&
      cd .. &&
      echo 'Building display example...' &&
      cd display &&
      alr --non-interactive build &&
      echo 'Converting display ELF to HEX...' &&
      arm-none-eabi-objcopy -O ihex bin/display bin/display.hex &&
      echo 'Done! The hex files are available in their respective bin/ directories.'
      "

volumes:
  alire_config:
  alire_data: